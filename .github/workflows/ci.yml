name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run Tests
        run: npx jest --ci --coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build Web
        run: npx expo export --platform web

      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist
          retention-days: 1

  distribute:
    name: Distribute Android APK
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    # Only ship a build when quality gates pass on a push to main.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      EXPO_PUBLIC_API_AES_KEY: ${{ secrets.EXPO_PUBLIC_API_AES_KEY }}
      # OAuth web client ID (type=3) used by GoogleSignin.configure on Android
      # to request an idToken. Not sensitive — same value is bundled into the
      # APK via google-services.json. Must match Firebase Authentication → Web
      # client ID.
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: 421167568469-kqknuidq9mtu66llumtdcitsr5j4j497.apps.googleusercontent.com
      # app.config.ts uses BUILD_NUMBER for versionCode / iOS buildNumber so the
      # workflow can stay on a shallow checkout (avoids the auth issues that
      # fetch-depth: 0 hits with GITHUB_TOKEN on this runner).
      BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - run: npm ci

      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          # The secret may be stored as raw JSON or as base64; accept either.
          # Whitespace from copy/paste line wraps is stripped before decoding.
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error::GOOGLE_SERVICES_JSON secret is empty"
            exit 1
          fi
          first_char="${GOOGLE_SERVICES_JSON:0:1}"
          if [ "$first_char" = "{" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > google-services.json
          else
            printf '%s' "$GOOGLE_SERVICES_JSON" | tr -d ' \t\r\n' | base64 -d > google-services.json
          fi
          node -e "JSON.parse(require('fs').readFileSync('google-services.json','utf8'))" \
            || { echo "::error::google-services.json is not valid JSON after decode"; exit 1; }

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --no-install

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: android-testers
          file: android/app/build/outputs/apk/release/app-release.apk
          releaseNotes: ${{ github.event.head_commit.message }}
