name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Tag-and-deploy on main needs write access to push the new annotated tag.
permissions:
  contents: write

# Cancel superseded runs on the same ref so a new push doesn't queue behind an
# obsolete build. `main` is exempt: a release run must never be aborted
# mid-flight (in-progress Play AAB / Firebase Hosting deploy).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  tag-release:
    name: Tag Release
    runs-on: ubuntu-latest
    # Only stamp a new version on a real merge to main. Everything else (dev,
    # PRs) just reuses whatever tag is already on the commit.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a token that can push tags back. GITHUB_TOKEN with `contents:
          # write` is enough; the push triggers no further workflow run because
          # tag pushes are not in the `on:` matchers above.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version
        id: bump
        run: |
          set -euo pipefail
          # If HEAD already carries a vX.Y.Z tag (typical for `npm run
          # release:*` flows), reuse it instead of double-bumping.
          existing="$(git tag --points-at HEAD --list 'v*' | head -n1 || true)"
          if [ -n "$existing" ]; then
            tag="$existing"
            echo "Reusing existing tag on HEAD: $tag"
          else
            # First-ever release uses v1.0.0 to match app.json's seed version.
            # Subsequent releases patch-bump from the last tag.
            last="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)"
            if [ -z "$last" ]; then
              tag='v1.0.0'
              echo "No existing tag — seeding initial release as $tag"
            else
              ver="${last#v}"
              IFS='.' read -r major minor patch <<<"$ver"
              patch=$((patch + 1))
              tag="v${major}.${minor}.${patch}"
              echo "Bumping from $last to $tag"
            fi
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git tag -a "$tag" -m "$tag"
            git push origin "$tag"
          fi
          echo "tag=$tag" >>"$GITHUB_OUTPUT"
          echo "version=${tag#v}" >>"$GITHUB_OUTPUT"

  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run Tests
        run: npx jest --ci --coverage

  # --- Production web (main only) → recipely.net (app-recipely hosting site) ---
  build-web-prod:
    name: Build Web (prod)
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, tag-release]
    # Production web build is a release artifact — only ship one when main
    # moves, so dev / PRs don't burn CI minutes producing throw-away exports.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      APP_VARIANT: production
      # Mirror the Android distribute job so app.config.ts derives the same
      # versionCode / buildNumber for both targets on a single CI run.
      BUILD_NUMBER: ${{ github.run_number }}
      EXPO_PUBLIC_API_AES_KEY: ${{ secrets.EXPO_PUBLIC_API_AES_KEY }}
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: 421167568469-kqknuidq9mtu66llumtdcitsr5j4j497.apps.googleusercontent.com
      # Firebase web config. These end up in the public client bundle and
      # are not secrets, but routing through GitHub Secrets keeps the values
      # out of git history (Secret Scanning flagged the apiKey when it was
      # inlined).
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
      EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `git describe --tags` in app.config.ts can resolve
          # the marketing version from the latest tag (including the one
          # tag-release just pushed).
          fetch-depth: 0
          ref: ${{ needs.tag-release.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build Web
        run: npm run build:web

      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: web-build-prod-${{ github.run_number }}
          path: dist
          retention-days: 30

      - name: Deploy to Firebase Hosting (prod)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: recipely-c05fc
          target: app-recipely
          channelId: live

  # --- Dev web (dev only) → app-recipely-dev.web.app (app-recipely-dev site) ---
  build-web-dev:
    name: Build Web (dev)
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    env:
      # Dev variant: app.config.ts injects extra.variant=development, so the
      # client targets https://dev-api.recipely.net and the dev web origin.
      APP_VARIANT: development
      BUILD_NUMBER: ${{ github.run_number }}
      EXPO_PUBLIC_API_AES_KEY: ${{ secrets.EXPO_PUBLIC_API_AES_KEY }}
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: 421167568469-kqknuidq9mtu66llumtdcitsr5j4j497.apps.googleusercontent.com
      # Same Firebase project (recipely-c05fc), so most config values are
      # shared with prod — only the Web app ID + measurement ID differ, since
      # the dev site is a separate Web app registration in the same project.
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID_DEV }}
      EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID_DEV }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `git describe --tags` in app.config.ts can resolve a
          # marketing version (falls back to app.json's seed when dev is
          # untagged).
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build Web
        run: npm run build:web

      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: web-build-dev-${{ github.run_number }}
          path: dist
          retention-days: 7

      - name: Deploy to Firebase Hosting (dev)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: recipely-c05fc
          target: app-recipely-dev
          channelId: live

  # --- Dev Android (dev only) → Firebase App Distribution (com.recipely.app.dev) ---
  distribute-dev:
    name: Distribute Android Dev (Firebase APK)
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    env:
      APP_VARIANT: development
      EXPO_PUBLIC_API_AES_KEY: ${{ secrets.EXPO_PUBLIC_API_AES_KEY }}
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: 421167568469-kqknuidq9mtu66llumtdcitsr5j4j497.apps.googleusercontent.com
      BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Cache the Gradle user home (downloaded dependencies + local build
      # cache) across runs. Biggest single CI speed-up for the Android build,
      # which otherwise re-resolves and re-compiles everything from scratch.
      - uses: gradle/actions/setup-gradle@v4

      - run: npm ci

      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          # The merged google-services.json must include the dev package
          # (com.recipely.app.dev) so the dev variant prebuild resolves it.
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error::GOOGLE_SERVICES_JSON secret is empty"
            exit 1
          fi
          first_char="${GOOGLE_SERVICES_JSON:0:1}"
          if [ "$first_char" = "{" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > google-services.json
          else
            printf '%s' "$GOOGLE_SERVICES_JSON" | tr -d ' \t\r\n' | base64 -d > google-services.json
          fi
          node -e "JSON.parse(require('fs').readFileSync('google-services.json','utf8'))" \
            || { echo "::error::google-services.json is not valid JSON after decode"; exit 1; }

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --no-install

      - name: Restore upload keystore
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          # Reuse the same upload keystore for the dev variant so consecutive
          # dev App Distribution releases install over one another.
          if [ -z "$ANDROID_UPLOAD_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_UPLOAD_KEYSTORE_BASE64 secret is empty"
            exit 1
          fi
          printf '%s' "$ANDROID_UPLOAD_KEYSTORE_BASE64" | tr -d ' \t\r\n' \
            | base64 -d > android/app/upload.keystore
          keytool -list -keystore android/app/upload.keystore \
            -alias "${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}" \
            -storepass "${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}" >/dev/null \
            || { echo "::error::upload.keystore invalid, wrong store password, or missing key alias"; exit 1; }

      - name: Write signing properties
        run: |
          {
            echo ""
            echo "RECIPELY_UPLOAD_STORE_FILE=upload.keystore"
            echo "RECIPELY_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}"
            echo "RECIPELY_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}"
            echo "RECIPELY_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}"
            echo "org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g"
            # Reuse task outputs from the cached Gradle home and run independent
            # tasks in parallel — both meaningfully cut the assemble/bundle time.
            echo "org.gradle.caching=true"
            echo "org.gradle.parallel=true"
          } >> android/gradle.properties

      - name: Build release APK
        working-directory: android
        run: |
          # Dev App Distribution only needs the APK (no Play AAB on dev).
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload to Firebase App Distribution (dev)
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID_DEV }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: android-testers
          file: android/app/build/outputs/apk/release/app-release.apk
          releaseNotes: |
            Recipely Dev (build ${{ github.run_number }})

            ${{ github.event.head_commit.message }}

      - name: Clean up signing material
        if: always()
        run: rm -f android/app/upload.keystore android/gradle.properties

  # --- Dev iOS (dev only) → Firebase App Distribution (net.recipely.app.dev) ---
  distribute-ios-dev:
    name: Distribute iOS Dev (Firebase IPA)
    runs-on: macos-15
    needs: [lint-and-typecheck, test]
    # Gated behind the IOS_CI_ENABLED repo variable: the job needs the Apple
    # signing secrets (IOS_DIST_CERT_P12_BASE64 / IOS_DIST_CERT_P12_PASSWORD /
    # IOS_ADHOC_PROFILE_DEV_BASE64) which don't exist yet. Flip the variable to
    # '1' once they are set to activate iOS distribution.
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev' && vars.IOS_CI_ENABLED == '1'
    env:
      APP_VARIANT: development
      EXPO_PUBLIC_API_AES_KEY: ${{ secrets.EXPO_PUBLIC_API_AES_KEY }}
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: 421167568469-kqknuidq9mtu66llumtdcitsr5j4j497.apps.googleusercontent.com
      # app.config.ts derives ios.buildNumber from BUILD_NUMBER, so the IPA and
      # the Android dev APK of the same run carry the same build number.
      BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `git describe --tags` in app.config.ts can resolve
          # a marketing version (falls back to app.json's seed when untagged).
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Restore GoogleService-Info.dev.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST_DEV: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_DEV }}
        run: |
          # app.config.ts points the dev variant at GoogleService-Info.dev.plist;
          # the secret may be raw XML or base64 — accept either, like the
          # Android google-services.json restore does.
          if [ -z "$GOOGLE_SERVICE_INFO_PLIST_DEV" ]; then
            echo "::error::GOOGLE_SERVICE_INFO_PLIST_DEV secret is empty"
            exit 1
          fi
          first_char="${GOOGLE_SERVICE_INFO_PLIST_DEV:0:1}"
          if [ "$first_char" = "<" ]; then
            printf '%s' "$GOOGLE_SERVICE_INFO_PLIST_DEV" > GoogleService-Info.dev.plist
          else
            printf '%s' "$GOOGLE_SERVICE_INFO_PLIST_DEV" | tr -d ' \t\r\n' | base64 -d > GoogleService-Info.dev.plist
          fi
          plutil -lint GoogleService-Info.dev.plist

      - name: Expo prebuild (iOS)
        run: npx expo prebuild --platform ios --no-install

      # CocoaPods re-downloads every spec on a fresh runner; caching its
      # download cache is the biggest iOS CI speed-up short of caching Pods/.
      - uses: actions/cache@v4
        with:
          path: ~/Library/Caches/CocoaPods
          key: pods-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Install signing certificate & profile
        env:
          IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          IOS_DIST_CERT_P12_PASSWORD: ${{ secrets.IOS_DIST_CERT_P12_PASSWORD }}
          IOS_ADHOC_PROFILE_BASE64: ${{ secrets.IOS_ADHOC_PROFILE_DEV_BASE64 }}
        run: |
          # Import the Apple Distribution certificate into a throwaway keychain
          # and install the ad-hoc provisioning profile. The profile's Name is
          # exported for the archive/export steps so the secrets stay the only
          # place that knows which profile is in use.
          set -euo pipefail
          # The p12 password is guarded too: we always create the p12 with one,
          # so an empty value means a mis-set secret, not a password-less cert.
          if [ -z "$IOS_DIST_CERT_P12_BASE64" ] || [ -z "$IOS_DIST_CERT_P12_PASSWORD" ] || [ -z "$IOS_ADHOC_PROFILE_BASE64" ]; then
            echo "::error::iOS signing secrets are missing"
            exit 1
          fi
          KEYCHAIN_PASSWORD="$(uuidgen)"
          KEYCHAIN_PATH="$RUNNER_TEMP/ios-build.keychain-db"
          printf '%s' "$IOS_DIST_CERT_P12_BASE64" | tr -d ' \t\r\n' | base64 -d > "$RUNNER_TEMP/dist-cert.p12"
          printf '%s' "$IOS_ADHOC_PROFILE_BASE64" | tr -d ' \t\r\n' | base64 -d > "$RUNNER_TEMP/adhoc.mobileprovision"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/dist-cert.p12" -k "$KEYCHAIN_PATH" \
            -P "$IOS_DIST_CERT_P12_PASSWORD" -A -t cert -f pkcs12
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security cms -D -i "$RUNNER_TEMP/adhoc.mobileprovision" > "$RUNNER_TEMP/profile.plist"
          PROFILE_UUID=$(plutil -extract UUID raw -o - "$RUNNER_TEMP/profile.plist")
          PROFILE_NAME=$(plutil -extract Name raw -o - "$RUNNER_TEMP/profile.plist")
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$RUNNER_TEMP/adhoc.mobileprovision" \
            "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Build & export ad-hoc IPA (dev)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Prebuild derives the Xcode project name from the display name
          # ("Recipely (Dev)" → RecipelyDev), so resolve workspace/scheme from
          # disk instead of hard-coding them.
          set -euo pipefail
          WORKSPACE=$(ls -d ios/*.xcworkspace | head -n1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" \
            -configuration Release -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/app.xcarchive" archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME"
          # "release-testing" is Xcode 15.4+'s name for the ad-hoc export.
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>release-testing</string>
            <key>teamID</key><string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>net.recipely.app.dev</key><string>$PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive -archivePath "$RUNNER_TEMP/app.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"
          IPA_PATH=$(ls "$RUNNER_TEMP"/export/*.ipa | head -n1)
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      # Keep the IPA even if the Firebase upload flakes — a macOS build is too
      # expensive to lose to a transient distribution error.
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-dev-${{ github.run_number }}
          path: ${{ env.IPA_PATH }}
          retention-days: 7

      - name: Upload to Firebase App Distribution (dev)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_IOS_APP_ID_DEV: ${{ secrets.FIREBASE_IOS_APP_ID_DEV }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          # The wzieba distribution action is Docker-based and can't run on
          # macOS runners, so drive the firebase CLI directly. Release notes go
          # through a file to survive arbitrary commit-message characters.
          set -euo pipefail
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          printf 'Recipely iOS Dev (build %s)\n\n%s\n' \
            "${{ github.run_number }}" "$COMMIT_MESSAGE" > "$RUNNER_TEMP/release-notes.txt"
          npx firebase-tools@14 appdistribution:distribute "$IPA_PATH" \
            --app "$FIREBASE_IOS_APP_ID_DEV" \
            --groups ios-testers \
            --release-notes-file "$RUNNER_TEMP/release-notes.txt"

      - name: Clean up signing material
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/ios-build.keychain-db" || true
          # Restore the default keychain search list in case the runner is ever
          # non-ephemeral (same caution as the Android cleanup).
          security list-keychains -d user -s login.keychain-db || true
          rm -f "$RUNNER_TEMP/dist-cert.p12" "$RUNNER_TEMP/adhoc.mobileprovision" \
            "$RUNNER_TEMP/profile.plist" "$RUNNER_TEMP/ExportOptions.plist" \
            "$RUNNER_TEMP/firebase-sa.json" "$RUNNER_TEMP/release-notes.txt"
          rm -rf "$HOME/Library/MobileDevice/Provisioning Profiles"

  # --- Production Android (main only) → Google Play internal (no Firebase App Distribution) ---
  distribute-prod:
    name: Distribute Android Prod (Play AAB)
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, tag-release]
    # Only ship a build when quality gates pass on a push to main.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      APP_VARIANT: production
      EXPO_PUBLIC_API_AES_KEY: ${{ secrets.EXPO_PUBLIC_API_AES_KEY }}
      # OAuth web client ID (type=3) used by GoogleSignin.configure on Android
      # to request an idToken. Not sensitive — same value is bundled into the
      # APK via google-services.json. Must match Firebase Authentication → Web
      # client ID.
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: 421167568469-kqknuidq9mtu66llumtdcitsr5j4j497.apps.googleusercontent.com
      # app.config.ts uses BUILD_NUMBER for versionCode / iOS buildNumber.
      BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history + the just-pushed tag so `git describe` reads the
          # bumped version inside app.config.ts.
          fetch-depth: 0
          ref: ${{ needs.tag-release.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Cache the Gradle user home (downloaded dependencies + local build
      # cache) across runs. Biggest single CI speed-up for the Android build,
      # which otherwise re-resolves and re-compiles everything from scratch.
      - uses: gradle/actions/setup-gradle@v4

      - run: npm ci

      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          # The secret may be stored as raw JSON or as base64; accept either.
          # Whitespace from copy/paste line wraps is stripped before decoding.
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error::GOOGLE_SERVICES_JSON secret is empty"
            exit 1
          fi
          first_char="${GOOGLE_SERVICES_JSON:0:1}"
          if [ "$first_char" = "{" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > google-services.json
          else
            printf '%s' "$GOOGLE_SERVICES_JSON" | tr -d ' \t\r\n' | base64 -d > google-services.json
          fi
          node -e "JSON.parse(require('fs').readFileSync('google-services.json','utf8'))" \
            || { echo "::error::google-services.json is not valid JSON after decode"; exit 1; }

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --no-install

      - name: Restore upload keystore
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          # The release signingConfig injected by ./plugins/withAndroidReleaseSigning
          # resolves storeFile relative to android/app, so decode there. Without
          # this keystore the build would fall back to debug signing, which the
          # Play Store rejects — so fail loudly if the secret is missing.
          if [ -z "$ANDROID_UPLOAD_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_UPLOAD_KEYSTORE_BASE64 secret is empty"
            exit 1
          fi
          printf '%s' "$ANDROID_UPLOAD_KEYSTORE_BASE64" | tr -d ' \t\r\n' \
            | base64 -d > android/app/upload.keystore
          # Validate the store password AND that the configured alias exists,
          # so a wrong secret fails here with a clear message instead of deep
          # inside the Gradle signing task.
          keytool -list -keystore android/app/upload.keystore \
            -alias "${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}" \
            -storepass "${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}" >/dev/null \
            || { echo "::error::upload.keystore invalid, wrong store password, or missing key alias"; exit 1; }

      - name: Write signing properties
        run: |
          # Gradle project properties consumed by the injected release
          # signingConfig. Appended after prebuild because android/ is
          # regenerated every run. The leading newline is REQUIRED: expo's
          # generated gradle.properties has no trailing newline, so without it
          # RECIPELY_UPLOAD_STORE_FILE concatenates onto the last line, Gradle
          # never sees the property, and the release build silently falls back
          # to the debug key — which Play rejects as the wrong upload key.
          # The last org.gradle.jvmargs in the file wins, so this overrides the
          # template's -Xmx2048m. R8 + bundletool (packageReleaseBundle) OOMs at
          # 2 GB on a fresh CI build; the hosted runner has 16 GB, so give it
          # room. Local builds didn't hit this because the bundle task was cached.
          {
            echo ""
            echo "RECIPELY_UPLOAD_STORE_FILE=upload.keystore"
            echo "RECIPELY_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}"
            echo "RECIPELY_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}"
            echo "RECIPELY_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}"
            echo "org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g"
            # Reuse task outputs from the cached Gradle home and run independent
            # tasks in parallel — both meaningfully cut the assemble/bundle time.
            echo "org.gradle.caching=true"
            echo "org.gradle.parallel=true"
          } >> android/gradle.properties

      - name: Build release AAB
        working-directory: android
        run: |
          # AAB is the Play Store artifact; release-signed via upload.keystore.
          # Firebase App Distribution has moved to the dev branch, so main no
          # longer builds/ships an APK.
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Verify AAB is signed with the upload key
        run: |
          # Guard against silent debug-signing (e.g. a missing/mangled signing
          # property): the AAB's signer cert must match the upload keystore, or
          # Play would reject it after a full upload attempt.
          aab_sha=$(keytool -printcert -jarfile android/app/build/outputs/bundle/release/app-release.aab 2>/dev/null \
            | awk -F'SHA256: ' '/SHA256:/{print $2; exit}')
          key_sha=$(keytool -list -v -keystore android/app/upload.keystore \
            -alias "${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}" \
            -storepass "${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}" 2>/dev/null \
            | awk -F'SHA256: ' '/SHA256:/{print $2; exit}')
          echo "AAB signer:  $aab_sha"
          echo "Upload key:  $key_sha"
          if [ -z "$aab_sha" ] || [ "$aab_sha" != "$key_sha" ]; then
            echo "::error::AAB is not signed with the upload key (likely debug fallback) — aborting before Play upload"
            exit 1
          fi

      - name: Upload AAB to Google Play (internal)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.recipely.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          # Per-locale "What's new" notes (whatsnew-en-US, whatsnew-tr-TR).
          # Store listing copy (title/short/full) lives in fastlane/metadata
          # and is uploaded separately — r0adkll only pushes release notes.
          whatsNewDirectory: distribution/whatsnew

      - name: Clean up signing material
        if: always()
        # Self-hosted runners may not wipe the workspace between jobs, so the
        # keystore and the appended signing passwords must not linger on disk.
        run: rm -f android/app/upload.keystore android/gradle.properties

  # --- Production iOS (main only) → Firebase App Distribution (net.recipely.app) ---
  # Interim channel until the TestFlight decision: prod IPAs go to the same
  # ios-testers group, versioned from the tag that tag-release just pushed.
  distribute-ios-prod:
    name: Distribute iOS Prod (Firebase IPA)
    runs-on: macos-15
    needs: [lint-and-typecheck, test, tag-release]
    # Same IOS_CI_ENABLED gate as distribute-ios-dev — see that job's comment.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.IOS_CI_ENABLED == '1'
    env:
      APP_VARIANT: production
      EXPO_PUBLIC_API_AES_KEY: ${{ secrets.EXPO_PUBLIC_API_AES_KEY }}
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: 421167568469-kqknuidq9mtu66llumtdcitsr5j4j497.apps.googleusercontent.com
      # Mirrors the Android distribute job so app.config.ts derives the same
      # versionCode / buildNumber for every target of a single CI run.
      BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history + the just-pushed tag so `git describe` reads the
          # bumped version inside app.config.ts.
          fetch-depth: 0
          ref: ${{ needs.tag-release.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Restore GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          # The secret may be raw XML or base64 — accept either, like the
          # Android google-services.json restore does.
          if [ -z "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "::error::GOOGLE_SERVICE_INFO_PLIST secret is empty"
            exit 1
          fi
          first_char="${GOOGLE_SERVICE_INFO_PLIST:0:1}"
          if [ "$first_char" = "<" ]; then
            printf '%s' "$GOOGLE_SERVICE_INFO_PLIST" > GoogleService-Info.plist
          else
            printf '%s' "$GOOGLE_SERVICE_INFO_PLIST" | tr -d ' \t\r\n' | base64 -d > GoogleService-Info.plist
          fi
          plutil -lint GoogleService-Info.plist

      - name: Expo prebuild (iOS)
        run: npx expo prebuild --platform ios --no-install

      # CocoaPods re-downloads every spec on a fresh runner; caching its
      # download cache is the biggest iOS CI speed-up short of caching Pods/.
      - uses: actions/cache@v4
        with:
          path: ~/Library/Caches/CocoaPods
          key: pods-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Install signing certificate & profile
        env:
          IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          IOS_DIST_CERT_P12_PASSWORD: ${{ secrets.IOS_DIST_CERT_P12_PASSWORD }}
          IOS_ADHOC_PROFILE_BASE64: ${{ secrets.IOS_ADHOC_PROFILE_BASE64 }}
        run: |
          # Same throwaway-keychain dance as distribute-ios-dev, with the prod
          # ad-hoc profile (net.recipely.app).
          set -euo pipefail
          # The p12 password is guarded too: we always create the p12 with one,
          # so an empty value means a mis-set secret, not a password-less cert.
          if [ -z "$IOS_DIST_CERT_P12_BASE64" ] || [ -z "$IOS_DIST_CERT_P12_PASSWORD" ] || [ -z "$IOS_ADHOC_PROFILE_BASE64" ]; then
            echo "::error::iOS signing secrets are missing"
            exit 1
          fi
          KEYCHAIN_PASSWORD="$(uuidgen)"
          KEYCHAIN_PATH="$RUNNER_TEMP/ios-build.keychain-db"
          printf '%s' "$IOS_DIST_CERT_P12_BASE64" | tr -d ' \t\r\n' | base64 -d > "$RUNNER_TEMP/dist-cert.p12"
          printf '%s' "$IOS_ADHOC_PROFILE_BASE64" | tr -d ' \t\r\n' | base64 -d > "$RUNNER_TEMP/adhoc.mobileprovision"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/dist-cert.p12" -k "$KEYCHAIN_PATH" \
            -P "$IOS_DIST_CERT_P12_PASSWORD" -A -t cert -f pkcs12
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security cms -D -i "$RUNNER_TEMP/adhoc.mobileprovision" > "$RUNNER_TEMP/profile.plist"
          PROFILE_UUID=$(plutil -extract UUID raw -o - "$RUNNER_TEMP/profile.plist")
          PROFILE_NAME=$(plutil -extract Name raw -o - "$RUNNER_TEMP/profile.plist")
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$RUNNER_TEMP/adhoc.mobileprovision" \
            "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Build & export ad-hoc IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Workspace/scheme resolved from disk (prebuild derives them from the
          # display name: "Recipely" → Recipely).
          set -euo pipefail
          WORKSPACE=$(ls -d ios/*.xcworkspace | head -n1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" \
            -configuration Release -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/app.xcarchive" archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME"
          # "release-testing" is Xcode 15.4+'s name for the ad-hoc export.
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>release-testing</string>
            <key>teamID</key><string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>net.recipely.app</key><string>$PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive -archivePath "$RUNNER_TEMP/app.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"
          IPA_PATH=$(ls "$RUNNER_TEMP"/export/*.ipa | head -n1)
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      # Keep the IPA even if the Firebase upload flakes — a macOS build is too
      # expensive to lose to a transient distribution error.
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-prod-${{ github.run_number }}
          path: ${{ env.IPA_PATH }}
          retention-days: 30

      - name: Upload to Firebase App Distribution (prod)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_IOS_APP_ID: ${{ secrets.FIREBASE_IOS_APP_ID }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          # The wzieba distribution action is Docker-based and can't run on
          # macOS runners, so drive the firebase CLI directly. Release notes go
          # through a file to survive arbitrary commit-message characters.
          set -euo pipefail
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          printf 'Recipely iOS %s (build %s)\n\n%s\n' \
            "${{ needs.tag-release.outputs.version }}" "${{ github.run_number }}" \
            "$COMMIT_MESSAGE" > "$RUNNER_TEMP/release-notes.txt"
          npx firebase-tools@14 appdistribution:distribute "$IPA_PATH" \
            --app "$FIREBASE_IOS_APP_ID" \
            --groups ios-testers \
            --release-notes-file "$RUNNER_TEMP/release-notes.txt"

      - name: Clean up signing material
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/ios-build.keychain-db" || true
          # Restore the default keychain search list in case the runner is ever
          # non-ephemeral (same caution as the Android cleanup).
          security list-keychains -d user -s login.keychain-db || true
          rm -f "$RUNNER_TEMP/dist-cert.p12" "$RUNNER_TEMP/adhoc.mobileprovision" \
            "$RUNNER_TEMP/profile.plist" "$RUNNER_TEMP/ExportOptions.plist" \
            "$RUNNER_TEMP/firebase-sa.json" "$RUNNER_TEMP/release-notes.txt"
          rm -rf "$HOME/Library/MobileDevice/Provisioning Profiles"
